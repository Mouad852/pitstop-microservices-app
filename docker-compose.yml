version: '3.8'

services:
  pitstop-customer-database:
    image: mysql:latest
    env_file:
      - ./pitstop-customer/.env
    volumes:
      - customer-db:/var/lib/mysql
      - ./pitstop-customer/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - netpitstop
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pDauom@2004"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pitstop-vehicle-database:
    image: mysql:latest
    env_file:
      - ./pitstop-vehicle/.env
    volumes:
      - vehicle-db:/var/lib/mysql
      - ./pitstop-vehicle/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - netpitstop
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pDauom@2004"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pitstop-workshop-database:
    image: mysql:latest
    env_file:
      - ./pitstop-workshop-planning/.env
    volumes:
      - workshop-db:/var/lib/mysql
      - ./pitstop-workshop-planning/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - netpitstop
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pDauom@2004"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pitstop-rabbitmq:
    image: rabbitmq:3-management
    networks:
      - netpitstop
    ports:
      - "5675:5672"
      - "15675:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pitstop-customer-service:
    build:
      context: ./pitstop-customer/
      dockerfile: Dockerfile
    env_file:
      - ./pitstop-customer/.env
    depends_on:
      pitstop-customer-database:
        condition: service_healthy
      pitstop-rabbitmq:
        condition: service_healthy
    networks:
      - netpitstop
    ports:
      - "3001:3001"

  pitstop-vehicle-service:
    build:
      context: ./pitstop-vehicle/
      dockerfile: Dockerfile
    env_file:
      - ./pitstop-vehicle/.env
    depends_on:
      pitstop-vehicle-database:
        condition: service_healthy
      pitstop-rabbitmq:
        condition: service_healthy
    networks:
      - netpitstop
    ports:
      - "3002:3002"

  pitstop-workshop-service:
    build:
      context: ./pitstop-workshop-planning/
      dockerfile: Dockerfile
    env_file:
      - ./pitstop-workshop-planning/.env
    depends_on:
      pitstop-workshop-database:
        condition: service_healthy
      pitstop-rabbitmq:
        condition: service_healthy
    networks:
      - netpitstop
    ports:
      - "3003:3003"

  pitstop-gateway:
    build:
      context: ./pitstop-express-gateway/
      dockerfile: Dockerfile
    depends_on:
      pitstop-customer-service:
        condition: service_started
      pitstop-vehicle-service:
        condition: service_started
      pitstop-workshop-service:
        condition: service_started
    networks:
      - netpitstop
    ports:
      - "8085:8080"

  pitstop-webapp:
    build:
      context: ./pitstop-webapp/
      dockerfile: Dockerfile
    depends_on:
      pitstop-gateway:
        condition: service_started
    networks:
      - netpitstop
    ports:
      - "8082:80"

networks:
  netpitstop:

volumes:
  customer-db:
  vehicle-db:
  workshop-db:
  rabbitmq-data: